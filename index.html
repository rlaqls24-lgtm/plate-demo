<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>번호판 인식 데모</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  background: #f2f1ec; min-height: 100vh;
  display: flex; align-items: center; justify-content: center; padding: 20px;
}
.card {
  background: #fff; border-radius: 20px; padding: 32px 28px;
  width: 100%; max-width: 420px; box-shadow: 0 8px 40px rgba(0,0,0,.1);
}
.title { font-size: 20px; font-weight: 900; margin-bottom: 6px; }
.sub { font-size: 13px; color: #888; margin-bottom: 28px; }

.upload-area {
  border: 2px dashed #ddd; border-radius: 14px;
  padding: 36px 20px; text-align: center; cursor: pointer;
  transition: all .2s; margin-bottom: 16px; position: relative;
  background: #fafafa;
}
.upload-area:hover { border-color: #111; background: #f5f5f5; }
.upload-area.has-image { border-style: solid; border-color: #111; padding: 0; overflow: hidden; }
.upload-area img { width: 100%; border-radius: 12px; display: block; max-height: 240px; object-fit: cover; }
.upload-icon { font-size: 36px; margin-bottom: 10px; }
.upload-text { font-size: 14px; font-weight: 700; color: #333; margin-bottom: 4px; }
.upload-sub { font-size: 12px; color: #aaa; }
input[type=file] { display: none; }

.btn-analyze {
  width: 100%; padding: 15px; border: none; border-radius: 12px;
  background: #111; color: #fff; font-size: 15px; font-weight: 800;
  cursor: pointer; transition: all .2s; font-family: inherit;
}
.btn-analyze:hover { background: #333; }
.btn-analyze:disabled { background: #ccc; cursor: not-allowed; }

.result {
  margin-top: 20px; border-radius: 14px; overflow: hidden;
  display: none;
}
.result.show { display: block; }
.result-header {
  background: #111; color: #d4ff00; padding: 12px 16px;
  font-size: 12px; font-weight: 700; letter-spacing: .1em;
}
.result-body { background: #f8f7f3; padding: 16px; }
.result-plate {
  font-size: 32px; font-weight: 900; letter-spacing: .08em;
  color: #111; margin-bottom: 12px; font-family: monospace;
}
.result-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 1px solid #eee; font-size: 13px;
}
.result-row:last-child { border-bottom: none; }
.result-label { color: #888; font-weight: 600; }
.result-val { font-weight: 700; color: #111; }

.loading {
  text-align: center; padding: 24px; display: none;
}
.loading.show { display: block; }
.spinner {
  width: 36px; height: 36px; border: 3px solid #eee;
  border-top-color: #111; border-radius: 50%;
  animation: spin .7s linear infinite; margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: #888; font-weight: 600; }

.error {
  background: #fff0f0; border-radius: 10px; padding: 14px 16px;
  color: #dc3545; font-size: 13px; font-weight: 600;
  margin-top: 16px; display: none;
}
.error.show { display: block; }

.retry-btn {
  width: 100%; margin-top: 12px; padding: 11px; border-radius: 9px;
  border: 1.5px solid #ddd; background: #fff; font-family: inherit;
  font-size: 13px; font-weight: 700; color: #666; cursor: pointer;
}
</style>
</head>
<body>
<div class="card">
  <div class="title">🚗 번호판 인식</div>
  <div class="sub">사진을 찍거나 업로드하면 번호판을 자동으로 읽어요</div>

  <label class="upload-area" id="uploadArea" for="fileInput">
    <div id="uploadPlaceholder">
      <div class="upload-icon">📷</div>
      <div class="upload-text">사진 찍기 / 업로드</div>
      <div class="upload-sub">번호판이 잘 보이게 찍어주세요</div>
    </div>
    <img id="previewImg" style="display:none">
  </label>
  <input type="file" id="fileInput" accept="image/*" capture="environment">

  <button class="btn-analyze" id="btnAnalyze" disabled>번호판 인식하기</button>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">AI가 번호판을 읽고 있어요...</div>
  </div>

  <div class="error" id="errorBox"></div>

  <div class="result" id="result">
    <div class="result-header">✅ 인식 완료</div>
    <div class="result-body">
      <div class="result-plate" id="rPlate">-</div>
      <div class="result-row">
        <span class="result-label">차종</span>
        <span class="result-val" id="rType">-</span>
      </div>
      <div class="result-row">
        <span class="result-label">연식 추정</span>
        <span class="result-val" id="rYear">-</span>
      </div>
      <div class="result-row">
        <span class="result-label">색상</span>
        <span class="result-val" id="rColor">-</span>
      </div>
      <div class="result-row">
        <span class="result-label">특이사항</span>
        <span class="result-val" id="rNote">-</span>
      </div>
    </div>
    <button class="retry-btn" id="retryBtn">다시 찍기</button>
  </div>
</div>

<script>
const CLAUDE_KEY = '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';
let selectedFile = null;

const fileInput = document.getElementById('fileInput');
const uploadArea = document.getElementById('uploadArea');
const uploadPlaceholder = document.getElementById('uploadPlaceholder');
const previewImg = document.getElementById('previewImg');
const btnAnalyze = document.getElementById('btnAnalyze');
const loading = document.getElementById('loading');
const result = document.getElementById('result');
const errorBox = document.getElementById('errorBox');

fileInput.onchange = e => {
  const file = e.target.files[0];
  if (!file) return;
  selectedFile = file;
  const url = URL.createObjectURL(file);
  previewImg.src = url;
  previewImg.style.display = 'block';
  uploadPlaceholder.style.display = 'none';
  uploadArea.classList.add('has-image');
  btnAnalyze.disabled = false;
  result.classList.remove('show');
  errorBox.classList.remove('show');
};

document.getElementById('retryBtn').onclick = () => {
  selectedFile = null;
  previewImg.style.display = 'none';
  uploadPlaceholder.style.display = 'block';
  uploadArea.classList.remove('has-image');
  btnAnalyze.disabled = true;
  result.classList.remove('show');
  errorBox.classList.remove('show');
  fileInput.value = '';
};

btnAnalyze.onclick = async () => {
  if (!selectedFile) return;
  btnAnalyze.disabled = true;
  loading.classList.add('show');
  result.classList.remove('show');
  errorBox.classList.remove('show');

  try {
    const base64 = await new Promise(res => {
      const r = new FileReader();
      r.onload = () => res(r.result.split(',')[1]);
      r.readAsDataURL(selectedFile);
    });

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': CLAUDE_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 500,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: { type: 'base64', media_type: selectedFile.type, data: base64 }
            },
            {
              type: 'text',
              text: `이 이미지에서 자동차 번호판 정보를 추출해줘.
반드시 아래 JSON 형식으로만 답해. 다른 말은 하지마.
{
  "plate": "번호판 텍스트 (예: 12가3456)",
  "carType": "차종 (보이면, 예: 현대 아반떼, 기아 K5)",
  "year": "연식 추정 (번호판 체계로 유추, 예: 2006년 이후)",
  "color": "차량 색상",
  "note": "특이사항 (번호판 안보이면 '번호판 식별 불가')"
}
번호판이 없거나 안보이면 plate에 '식별불가' 넣어줘.`
            }
          ]
        }]
      })
    });

    const data = await response.json();
    if (!response.ok) throw new Error(data.error?.message || 'API 오류');

    const text = data.content[0].text;
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    document.getElementById('rPlate').textContent = parsed.plate || '-';
    document.getElementById('rType').textContent = parsed.carType || '식별 불가';
    document.getElementById('rYear').textContent = parsed.year || '-';
    document.getElementById('rColor').textContent = parsed.color || '-';
    document.getElementById('rNote').textContent = parsed.note || '-';

    loading.classList.remove('show');
    result.classList.add('show');

  } catch(err) {
    loading.classList.remove('show');
    errorBox.textContent = '❌ 인식 실패: ' + (err.message || '다시 시도해주세요');
    errorBox.classList.add('show');
    btnAnalyze.disabled = false;
  }
};
</script>
</body>
</html>
